<!DOCTYPE html>
<html lang="en">
    <header style="border: solid, rgb(44, 44, 44); border-top: 0px; border-right: 0px; border-left: 0px;">
        <br>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/960px-Instagram_logo.svg.png" alt="" style="width: 7%; height: 7%; left: 500px; position: relative;">

    </header>

  <head>
    <title>DemiAsylumOfficial</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
    <link rel="stylesheet" href="demigram.css" />
  </head>
  <body>
    <header>

      <div class="container">

        <div class="profile">

          <div class="profile-image">

            <img src="assets/demiAsylumLogo.png" alt="" style="height: 100%; width: 100%;">

          </div>

          <div class="profile-user-settings">

            <h1 class="profile-user-name">DemiAsylumOficial </h1>

            <button class="btn profile-edit-btn" style="background-color: rgb(30, 71, 255) ; color: #fff;">Seguir</button>

          </div>

          <div class="profile-stats">

            <ul>
              <li><span class="profile-stat-count">3</span> publicaciones</li>
              <li><span class="profile-stat-count">188</span> seguidores</li>
              <li><span class="profile-stat-count">10</span> seguidos</li>
            </ul>

          </div>

          <div class="profile-bio">

            <p><span class="profile-real-name">Demi Asylum</span> Donde la tranquilidad contiene a cualquiera de sus impulsos.</p>

          </div>

        </div>
        <!-- End of profile section -->

      </div>
      <!-- End of container -->

    </header>

    <main>

      <div class="container">

        <div class="gallery">

          <div class="gallery-item" tabindex="0">

            <img src="assets/events/demiawards.png" class="gallery-image" alt="">

            <div class="gallery-item-info">

              <ul>
                <li class="gallery-item-likes"><span class="visually-hidden">Likes:</span><i class="fas fa-heart" aria-hidden="true"></i> 56</li>
                <li class="gallery-item-comments"><span class="visually-hidden">Comments:</span><i class="fas fa-comment" aria-hidden="true"></i> 2</li>
              </ul>

            </div>

          </div>

          <div class="gallery-item" tabindex="0">

            <img src="assets/demiAsylumLocationPhoto.jpeg" class="gallery-image" alt="">

            <div class="gallery-item-info">

              <ul>
                <li class="gallery-item-likes"><span class="visually-hidden">Likes:</span><i class="fas fa-heart" aria-hidden="true"></i> 89</li>
                <li class="gallery-item-comments"><span class="visually-hidden">Comments:</span><i class="fas fa-comment" aria-hidden="true"></i> 5</li>
              </ul>

            </div>

          </div>

          <div class="gallery-item" tabindex="0">

            <img src="assets/plp&coLogo.jpeg" class="gallery-image" alt="">

            <div class="gallery-item-type">

              <span class="visually-hidden">Gallery</span><i class="fas fa-clone" aria-hidden="true"></i>

            </div>

            <div class="gallery-item-info">

              <ul>
                <li class="gallery-item-likes"><span class="visually-hidden">Likes:</span><i class="fas fa-heart" aria-hidden="true"></i> 42</li>
                <li class="gallery-item-comments"><span class="visually-hidden">Comments:</span><i class="fas fa-comment" aria-hidden="true"></i> 1</li>
              </ul>

            </div>

          </div>


        </div>
        <!-- End of gallery -->

      </div>
      <!-- End of container -->

    </main>
  </body>
</html>
